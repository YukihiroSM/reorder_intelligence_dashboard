# Global (host) nginx for the Ubuntu server. Serves the built SPA from the
# webroot and reverse-proxies /api to the backend container (published on
# 127.0.0.1:8091 by docker-compose.prod.yml).
#
# Install: copy to /etc/nginx/sites-available/reorder-intelligence,
# symlink into sites-enabled, `nginx -t`, `systemctl reload nginx`.
# Then `certbot --nginx -d reorder-intelligence.yuk0-dev-team.pp.ua` adds TLS
# (listen 443 ssl + http->https redirect) automatically.

upstream reorder_intelligence_backend {
    server 127.0.0.1:8091;
}

server {
    server_name reorder-intelligence.yuk0-dev-team.pp.ua;
    access_log /var/log/nginx/reorder-intelligence.access.log;
    error_log  /var/log/nginx/reorder-intelligence.error.log;
    client_max_body_size 250M;

    root /var/www/reorder-intelligence;
    index index.html;

    # API -> FastAPI. No trailing path on proxy_pass, so the /api/ prefix is
    # preserved (matches the backend's APIRouter(prefix="/api")).
    location /api/ {
        proxy_pass http://reorder_intelligence_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite emits hashed filenames -> safe to cache long.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 80;
}
