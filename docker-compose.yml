# Local dev database. Host port 5440 -> container 5432 to avoid clashing with a
# system Postgres on 5432. Matches backend/.env.example DATABASE_URL.
services:
  postgres:
    image: postgres:16-alpine
    container_name: reorder_intel_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: reorder
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: reorder_intel
    ports:
      - "5440:5432"
    volumes:
      - reorder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reorder -d reorder_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  reorder_pgdata:
